name: Feature request
description: Propose a product improvement or new capability
title: "[Feature]: "
labels: []
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Describe the user problem before proposing implementation details. Public submission does not guarantee inclusion or a delivery date.
  - type: textarea
    id: problem
    attributes:
      label: What problem should this solve?
      description: Explain who experiences the problem, when it occurs, and why it matters.
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: What outcome would be useful?
      description: Describe the desired behavior without assuming a specific implementation.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives or workarounds
      description: Explain what you use today and why it is insufficient.
  - type: textarea
    id: scope
    attributes:
      label: Scope and examples
      description: Add representative examples, constraints, or edge cases.
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and discussions for this request.
          required: true
        - label: I described the user problem, not only a preferred implementation.
          required: true
        - label: I removed secrets, private URLs, and personal data.
          required: true
