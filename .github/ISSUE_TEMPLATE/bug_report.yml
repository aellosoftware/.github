name: Bug report
description: Report a reproducible problem in an Aello project
title: "[Bug]: "
labels: []
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Do not include secrets, personal data, or security vulnerabilities. Report vulnerabilities privately using the repository security policy.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the problem and its impact.
      placeholder: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: How can we reproduce it?
      description: Provide the smallest reliable set of steps.
      placeholder: |
        1. Configure...
        2. Run...
        3. Observe...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: v1.2.3 or commit SHA
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include relevant operating system, runtime, browser, deployment, or hardware details.
  - type: textarea
    id: evidence
    attributes:
      label: Additional evidence
      description: Add logs, screenshots, or context with sensitive information removed.
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues for the same problem.
          required: true
        - label: I removed secrets, private URLs, and personal data.
          required: true
        - label: This is not a security vulnerability.
          required: true
